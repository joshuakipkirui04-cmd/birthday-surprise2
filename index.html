<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lora:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background: linear-gradient(-45deg, #ff4e8b, #ff8ac5, #9c6bff, #5d9fff);
    background-size: 400% 400%;
    animation: bg 12s ease infinite;
}

@keyframes bg {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.card {
            background: linear-gradient(145deg, #a61b58, #e05263);
            border: 2px solid #d4af37; 
            /* This box-shadow creates the inner gold border effect */
            box-shadow: inset 0 0 0 4px rgba(166, 27, 88, 0.8), 
                        inset 0 0 0 6px #d4af37, 
                        0 15px 35px rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 35px 25px;
            width: 85%;
            max-width: 400px;
            color: white;
            font-family: 'Lora', serif;
            text-align: center;
            position: relative;
            z-index: 10;
            margin: 0 auto;
        }

        .card h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 48px; /* Increased size */
            line-height: 1.1;
            margin-bottom: 15px;
            font-weight: normal;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            /* Forces the text to stay tight and look more like a logo */
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .jewel-hearts {
            font-size: 14px;
            letter-spacing: 4px;
            margin-bottom: 25px;
            color: #d4af37; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }
button:hover {
    transform: scale(1.08);
}

.heart {
    position: absolute;
    color: white;
    animation: float 10s linear infinite;
    opacity: .8;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-120px); }
}

/* New Fade Animation for smooth transitions */
.fade-in {
    animation: fadeIn 0.4s ease-in-out;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

</head>

<body>

<div class="card" id="mainCard">
        <div id="mainCard" style="text-align: center; margin: 0 auto; width: 85%; max-width: 400px;">
        <img src="birthday-card.jpg" onclick="startSurprise()" alt="Happy Birthday" style="width: 100%; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer;">
    </div>
<script>

// Floating hearts
for(let i=0; i<40; i++){
    let heart = document.createElement("div");
    heart.innerHTML = "❤";
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "%";
    heart.style.fontSize = (20 + Math.random() * 30) + "px";
    heart.style.animationDuration = (5 + Math.random() * 8) + "s";
    heart.style.animationDelay = Math.random() * 5 + "s";
    document.body.appendChild(heart);
}

// Global Variables
const music = new Audio("music_song (2).mp3");
music.loop = true;
window.photos = [
    "Images/photo1.jpeg",
    "Images/photo2.jpeg",
    "Images/photo3.jpeg",
    "Images/photo4.jpeg"
];
window.current = 0;

function startSurprise() {
    if (window.galleryInterval) clearInterval(window.galleryInterval);
    
    // Only play if it's currently paused (prevents restarting the track if she goes 'Back')
    if (music.paused) music.play();
    
    document.querySelector(".card").innerHTML = `
        <div class="fade-in">
            <h1 style="font-size: 24px; margin-bottom: 10px;">Happy Birthday My Love ❤️</h1>

            <img src="Images/photo1.jpeg" style="
                width: 130px;
                height: 130px;
                border-radius: 50%;
                object-fit: cover;
                border: 4px solid white;
                margin: 10px auto;
                box-shadow: 0 0 20px rgba(255,255,255,0.5);
                display: block;
            ">

            <p style="font-size: 15px; margin-bottom: 15px; padding: 0 10px;">
                Every day with you is my favorite day.<br>Choose one of the surprises below ❤️
            </p>

            <video autoplay loop muted playsinline style="
                width: 220px;
                height: 280px;
                object-fit: cover;
                object-position: top;
                border-radius: 15px;
                margin: 0 auto 20px auto;
                box-shadow: 0 0 15px rgba(255,255,255,0.4);
                display: block;
            ">
                <source src="birthday-video.mp4" type="video/mp4">
            </video>

            <div style="
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                margin-top: 15px;
            ">
                <button onclick="showGallery()" style="display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 10px; font-size: 16px;">📸 Memories</button>
                <button onclick="showLetter()" style="display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 10px; font-size: 16px;">💌 Letter</button>
                <button onclick="showSong()" style="display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 10px; font-size: 16px;">🎵 Song</button>
                <button onclick="finalSurprise()" style="display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 10px; font-size: 16px;">🎁 Gift</button>
            </div>
        </div>
    `;
}

function showGallery() {
    if (window.galleryInterval) clearInterval(window.galleryInterval);
    window.current = 0;

    document.querySelector(".card").innerHTML = `
        <div class="fade-in">
            <h1 style="font-size: 24px; margin-bottom: 10px;">📸 Our Memories ❤️</h1>

          <img id="galleryImage" src="${window.photos[0]}" style="
                width: 280px;
                height: 340px;
                object-fit: cover;
                object-position: top; /* <--- THIS IS THE FIX */
                border-radius: 15px;
                border: 4px solid white;
                box-shadow: 0 0 20px rgba(255,255,255,0.5);
                margin: 15px auto;
                display: block;
                transition: opacity .3s ease;
            ">

            <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px;">
                <button onclick="previousPhoto()" style="padding: 10px 20px; font-size: 18px;">⬅️</button>
                <button onclick="nextPhoto()" style="padding: 10px 20px; font-size: 18px;">➡️</button>
            </div>

            <button onclick="startSurprise()" style="padding: 12px 25px; font-size: 16px;">🏠 Back</button>
        </div>
    `;

    window.galleryInterval = setInterval(() => {
        nextPhoto();
    }, 4000);
}

function previousPhoto() {
    if (window.current > 0) {
        window.current--;
    } else {
        window.current = window.photos.length - 1; // loop back to end
    }
    updateGalleryImage();
}

function nextPhoto() {
    if (window.current < window.photos.length - 1) {
        window.current++;
    } else {
        window.current = 0; // loop back to start
    }
    updateGalleryImage();
}

function updateGalleryImage() {
    let img = document.getElementById("galleryImage");
    if (img) {
        img.style.opacity = "0";
        setTimeout(() => {
            img.src = window.photos[window.current];
            img.style.opacity = "1";
        }, 300);
    }
}

function showLetter() {
    if (window.galleryInterval) clearInterval(window.galleryInterval);

    document.querySelector(".card").innerHTML = `
        <div class="fade-in">
            <h1 style="font-size: 24px; margin-bottom: 15px;">💌 My Letter</h1>

            <p style="line-height: 1.6; font-size: 16px; padding: 0 10px; margin-bottom: 25px; text-align: left;">
                Happy Birthday, my love ❤️<br><br>
                I thank God every day for bringing you into my life. Even though miles separate us, you are always in my heart. You make my days brighter, my smile bigger, and my future more beautiful.<br><br>
                I can't wait until the day I can celebrate your birthday beside you. Until then, know that you are deeply loved, appreciated, and cherished.<br><br>
                Happy Birthday, beautiful. ❤️
            </p>

            <button onclick="startSurprise()" style="padding: 12px 25px; font-size: 16px;">🏠 Back</button>
        </div>
    `;
}

function showSong() {
    if (window.galleryInterval) clearInterval(window.galleryInterval);

    // This checks if the music is currently playing to display the correct button text
    let buttonText = music.paused ? "▶️ Play Song" : "⏸️ Pause Song";

    document.querySelector(".card").innerHTML = `
        <div class="fade-in">
            <h1 style="font-size: 24px; margin-bottom: 15px;">🎵 Our Song</h1>

            <p style="font-size: 16px; padding: 0 10px; margin-bottom: 25px; line-height: 1.6;">
                I chose this song because I know you love it. ❤️<br><br>
                <i>(I don't really know the lyrics but i know it's your favorite)</i>
            </p>

            <button onclick="toggleMusic()" id="musicToggleBtn" style="padding: 12px 25px; font-size: 16px; margin-bottom: 25px; background: rgba(255,255,255,0.9);">
                ${buttonText}
            </button>
            <br>
            <button onclick="startSurprise()" style="padding: 12px 25px; font-size: 16px;">🏠 Back</button>
        </div>
    `;
}

function toggleMusic() {
    let btn = document.getElementById("musicToggleBtn");
    if (music.paused) {
        music.play();
        btn.innerHTML = "⏸️ Pause Song";
    } else {
        music.pause();
        btn.innerHTML = "▶️ Play Song";
    }
}

function finalSurprise() {
    if (window.galleryInterval) clearInterval(window.galleryInterval);

    document.querySelector(".card").innerHTML = `
        <div class="fade-in">
            <h1 style="font-size: 24px; margin-bottom: 15px;">🎁 One More Thing...</h1>

            <h2 style="font-size: 20px; margin: 20px 0;">I Love You So Much ❤️</h2>

            <p style="font-size: 16px; padding: 0 10px; margin-bottom: 25px;">
                Distance may keep us apart today, but nothing can stop how much I love you.<br><br>
                Happy Birthday, my beautiful girl.
            </p>

            <button onclick="startSurprise()" style="padding: 12px 25px; font-size: 16px;">🏠 Back</button>
        </div>
    `;
}
</script>

</body>
</html>
