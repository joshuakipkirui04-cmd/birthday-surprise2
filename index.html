<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(-45deg,#ff4e8b,#ff8ac5,#9c6bff,#5d9fff);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
    width:90%;
    max-width:500px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    padding:20px;
    border-radius:25px;
    text-align:center;
    color:white;
    box-shadow:0 0 40px rgba(0,0,0,.25);
}

h1{
    font-size:30px;
    margin-bottom:20px;
}

p{
    margin-bottom:30px;
    font-size:18px;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:40px;
    font-size:20px;
    cursor:pointer;
    background:white;
    color:#ff2f7d;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

.heart{
    position:absolute;
    color:white;
    animation:float 10s linear infinite;
    opacity:.8;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-120px);
}
}
</style>

</head>

<body>

<div class="card">
<h1>❤️ Happy Birthday ❤️</h1>

<p>To the most beautiful girl in my life.</p>

<button onclick="startSurprise()">
Open My Birthday Surprise ❤️
</button>

</div>

<script>

// Floating hearts
for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.innerHTML="❤";

heart.className="heart";

heart.style.left=Math.random()*100+"%";

heart.style.fontSize=(20+Math.random()*30)+"px";

heart.style.animationDuration=(5+Math.random()*8)+"s";

heart.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(heart);

}

// Surprise
const music = new Audio("music/song.mp3");
music.loop = true;
function startSurprise() {
    music.play();
    document.querySelector(".card").innerHTML = `
        <h1 style="font-size: 24px; margin-bottom: 10px;">Happy Birthday My Love ❤️</h1>

        <!-- Shrunk the image from 220px to 130px to save screen real estate -->
        <img src="Images/photo1.jpeg" style="
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            margin: 10px auto;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            display: block;
        ">

        <!-- Reduced text size and margin to create breathing room -->
        <p style="font-size: 15px; margin-bottom: 15px; padding: 0 10px;">
            Every day with you is my favorite day.<br>Choose one of the surprises below ❤️
        </p>

        <!-- Centered the video and adjusted the shadow for a cleaner look -->
        <video autoplay loop muted playsinline style="
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 15px;
            margin: 0 auto 20px auto;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
            display: block;
        ">
            <source src="birthday-video.mp4" type="video/mp4">
        </video>

        <!-- Tightened the grid and made the buttons flex to align icons and text properly -->
        <div style="
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        ">
            <button onclick="showGallery()" style="display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 10px; font-size: 16px;">📸 Memories</button>
            <button onclick="showLetter()" style="display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 10px; font-size: 16px;">💌 Letter</button>
            <button onclick="playSong()" style="display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 10px; font-size: 16px;">🎵 Song</button>
            <button onclick="finalSurprise()" style="display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 10px; font-size: 16px;">🎁 Gift</button>
        </div>
    `;
}

 function showGallery() {
    let photos = [
        "Images/photo1.jpeg",
        "Images/photo2.jpeg",
        "Images/photo3.jpeg",
        "Images/photo4.jpeg"
    ];
    let current = 0;

    document.querySelector(".card").innerHTML = `
        <h1 style="font-size: 24px; margin-bottom: 10px;">📸 Our Memories ❤️</h1>

        <!-- Centered and sized proportionally -->
        <img id="galleryImage" src="${photos[0]}" style="
            width: 220px;
            height: 280px;
            object-fit: cover;
            border-radius: 15px;
            border: 4px solid white;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            margin: 15px auto;
            display: block;
            transition: opacity .3s ease;
        ">

        <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px;">
            <button onclick="previousPhoto()" style="padding: 10px 20px; font-size: 18px;">⬅️</button>
            <button onclick="nextPhoto()" style="padding: 10px 20px; font-size: 18px;">➡️</button>
        </div>

        <button onclick="startSurprise()" style="padding: 12px 25px; font-size: 16px;">🏠 Back</button>
    `;

    window.photos = photos;
    window.current = current;

    // Clear existing interval if there is one to prevent glitching
    if (window.galleryInterval) clearInterval(window.galleryInterval);

    window.galleryInterval = setInterval(() => {
        nextPhoto(); // Reused your nextPhoto logic to keep it DRY
    }, 4000);
}

function showLetter() {
    document.querySelector(".card").innerHTML = `
        <h1 style="font-size: 24px; margin-bottom: 15px;">💌 My Letter</h1>

        <!-- Constrained the text width and centered it so it reads like a real card -->
        <p style="line-height: 1.6; font-size: 16px; padding: 0 10px; margin-bottom: 25px; text-align: left;">
            Happy Birthday, my love ❤️<br><br>
            I thank God every day for bringing you into my life. Even though miles separate us, you are always in my heart. You make my days brighter, my smile bigger, and my future more beautiful.<br><br>
            I can't wait until the day I can celebrate your birthday beside you. Until then, know that you are deeply loved, appreciated, and cherished.<br><br>
            Happy Birthday, beautiful. ❤️
        </p>

        <button onclick="startSurprise()" style="padding: 12px 25px; font-size: 16px;">🏠 Back</button>
    `;
}

function finalSurprise() {
    document.querySelector(".card").innerHTML = `
        <h1 style="font-size: 24px; margin-bottom: 15px;">🎁 One More Thing...</h1>

        <h2 style="font-size: 20px; margin: 20px 0;">I Love You So Much ❤️</h2>

        <p style="font-size: 16px; padding: 0 10px; margin-bottom: 25px;">
            Distance may keep us apart today, but nothing can stop how much I love you.<br><br>
            Happy Birthday, my beautiful girl.
        </p>

        <button onclick="startSurprise()" style="padding: 12px 25px; font-size: 16px;">🏠 Back</button>
    `;
}
</script>

</body>
</html>
